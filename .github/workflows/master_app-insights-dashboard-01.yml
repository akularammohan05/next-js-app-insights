name: Build and Deploy Next.js App to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Clean install (IMPORTANT)
      - name: Install dependencies
        run: npm ci

      # 4. Build Next.js app
      - name: Build app
        run: npm run build

      # 5. Verify build (helps debugging)
      - name: Verify build output
        run: ls -la

      # 6. Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-insights-dashboard-01
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_352780B3BCE645B78BFDE7CA7333DEAF }}
          package: .
